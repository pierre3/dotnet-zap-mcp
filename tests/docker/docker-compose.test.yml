# Test environment: OWASP ZAP + vulnerable target application
#
# Usage:
#   docker compose -f tests/docker/docker-compose.test.yml up -d --build
#   docker compose -f tests/docker/docker-compose.test.yml down

services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-test
    user: "0:0"
    restart: "no"
    networks:
      - zap-test-net
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - ZAP_API_KEY=${ZAP_API_KEY:-test-api-key-for-ci}
    entrypoint: ["/bin/sh", "/zap/wrk/entrypoint.sh"]
    command:
      - zap.sh
      - -daemon
      - -host
      - "0.0.0.0"
      - -port
      - "8090"
      - -config
      - "ajaxSpider.browserId=htmlunit"
    volumes:
      - ../../src/dotnet-zap-mcp/Docker/entrypoint.sh:/zap/wrk/entrypoint.sh:ro
      - ../../src/dotnet-zap-mcp/Docker/zap-config.xml:/zap/wrk/template/zap-config.xml:ro
      - zap-test-data:/zap/wrk/data
      - zap-test-home:/home/zap/.ZAP
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://127.0.0.1:8090/JSON/core/view/version/?apikey=${ZAP_API_KEY:-test-api-key-for-ci} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  target:
    build:
      context: ./vulnerable-app
    container_name: target-test
    restart: "no"
    networks:
      - zap-test-net
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

networks:
  zap-test-net:
    driver: bridge

volumes:
  zap-test-data:
  zap-test-home:
