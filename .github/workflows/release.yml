name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Pack
        run: dotnet pack --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # -- MCP Registry publish --

      - name: Update server.json version
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v | .packages[0].version = $v' \
            .mcp/server.json > .mcp/server.tmp.json
          mv .mcp/server.tmp.json .mcp/server.json

      - name: Wait for NuGet package availability
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Waiting for dotnet-zap-mcp $VERSION to be available on NuGet..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.nuget.org/v3-flatcontainer/dotnet-zap-mcp/${VERSION}/dotnet-zap-mcp.${VERSION}.nupkg")
            if [ "$STATUS" = "200" ]; then
              echo "Package is available on NuGet."
              exit 0
            fi
            echo "Attempt $i/30: not yet available (HTTP $STATUS). Waiting 30s..."
            sleep 30
          done
          echo "::warning::Package not yet indexed on NuGet after 15 minutes. Proceeding anyway."

      - name: Download mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish .mcp/server.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
